# 西胪莲藕电商管理系统配置文件

server:
  port: 8080
  servlet:
    context-path: /api
  # 静态资源配置
  resources:
    static-locations: file:${UPLOADS_DIR:/lotus-shop/uploads},classpath:/static

spring:
  application:
    name: lotus-shop
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/lotus_shop?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

mybatis-plus:
  configuration:
    # 驼峰命名映射
    map-underscore-to-camel-case: true
    # 日志实现
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      # 主键策略
      id-type: auto
      # 逻辑删除字段
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml

# JWT配置
jwt:
  secret: ${JWT_SECRET:lotus-shop-secret-key-must-be-at-least-256-bits-long-for-security}
  expire: 86400

# 阿里云 OSS 配置
aliyun:
  oss:
    endpoint: ${ALIYUN_OSS_ENDPOINT:oss-cn-beijing.aliyuncs.com}
    access-key-id: ${ALIYUN_OSS_ACCESS_KEY_ID:}
    access-key-secret: ${ALIYUN_OSS_ACCESS_KEY_SECRET:}
    bucket-name: ${ALIYUN_OSS_BUCKET_NAME:}
    domain: ${ALIYUN_OSS_DOMAIN:}

# 快递100配置
kuaidi100:
  # 快递100授权Key，请替换为您的真实Key
  key: ${KUAIDI100_KEY:}
  # 快递100客户ID，请替换为您的真实客户ID
  customer: ${KUAIDI100_CUSTOMER:}

# 日志配置
logging:
  level:
    com.lotus: debug
    org.springframework.security: debug

# 国内AI服务配置
ai:
  deepseek:
    api-key: ${DEEPSEEK_API_KEY:sk-7c95f97b20134ed6b3a15439a8e1d083}
    base-url: ${DEEPSEEK_API_BASE_URL:https://api.deepseek.com/v1}
  doubao:
    api-key: ${DOUBAO_API_KEY:47c2d50c-075a-4df6-a8b0-5966e4ebc2e6}
    base-url: ${DOUBAO_API_BASE_URL:https://ark.cn-beijing.volces.com/api/v3}
